name: Build and publish native packages

on:
  push:
    tags: ["svn-*"]
  workflow_dispatch:
    inputs:
      version:
        description: NuGet version, for example 1.16.0-dev.20260712.6e6a9b0
        required: true
        type: string
      publish:
        description: Publish to GitHub Packages
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: native-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Select package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $tag = '${{ github.ref_name }}'
            if (-not $tag.StartsWith('svn-')) { throw "Invalid release tag '$tag'." }
            $version = $tag.Substring(4)
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid NuGet version '$version'."
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Check Visual C++ toolchain
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installation) { throw 'Visual C++ x64 build tools are unavailable.' }
          if ('${{ matrix.rid }}' -eq 'win-arm64') {
            $compiler = Get-ChildItem "$installation\VC\Tools\MSVC\*\bin\Hostx64\arm64\cl.exe" | Select-Object -Last 1
            if (-not $compiler) { throw 'Visual C++ ARM64 build tools are unavailable.' }
          }

      - name: Build package
        run: >-
          dotnet run --project build/SvnFlux.Subversion.Native.Build -c Release --
          --rid ${{ matrix.rid }}
          --version ${{ steps.version.outputs.value }}

      - name: Verify native binaries
        shell: pwsh
        run: ./scripts/Verify-NativeBuild.ps1 -Rid ${{ matrix.rid }}

      - name: Restore binding generator
        run: dotnet tool restore

      - name: Generate P/Invoke bindings
        shell: pwsh
        run: ./scripts/Generate-Bindings.ps1 -Rid ${{ matrix.rid }}

      - name: Build P/Invoke wrapper
        run: dotnet build src/SvnFlux.Subversion.Interop.${{ matrix.rid }}/SvnFlux.Subversion.Interop.${{ matrix.rid }}.csproj -c Release

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: SvnFlux.Subversion.Native.${{ matrix.rid }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' || inputs.publish
        shell: pwsh
        run: |
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key "${{ secrets.GITHUB_TOKEN }}" `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

  wrapper:
    needs: build
    runs-on: windows-2025
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Select package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.Substring(4)
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Pack managed wrapper
        run: >-
          dotnet pack src/SvnFlux.Subversion/SvnFlux.Subversion.csproj
          -c Release
          -p:PackageVersion=${{ steps.version.outputs.value }}
          --output artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: SvnFlux.Subversion
          path: artifacts/packages/SvnFlux.Subversion.*.nupkg
          if-no-files-found: error

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' || inputs.publish
        shell: pwsh
        run: >-
          dotnet nuget push artifacts/packages/SvnFlux.Subversion.*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate
